services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: phts-postgres
    environment:
      POSTGRES_DB: phts
      POSTGRES_USER: phts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phts_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - phts-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phts"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Elasticsearch for Fast Search
  # ============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: phts-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - phts-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Redis for Caching
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: phts-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - phts-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Backend FHIR Server (FastAPI)
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phts-backend
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://phts:${POSTGRES_PASSWORD:-phts_dev_password}@postgres:5432/phts
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ENABLE_AUTH: ${ENABLE_AUTH:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      UMLS_API_KEY: ${UMLS_API_KEY:-}
      LOINC_USERNAME: ${LOINC_USERNAME:-}
      LOINC_PASSWORD: ${LOINC_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - phts-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================================
  # Frontend (React + Vite)
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: phts-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - phts-network
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: phts-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - phts-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Prometheus Metrics Collection
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: phts-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - phts-network
    restart: unless-stopped

  # ============================================================================
  # Grafana Dashboards
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: phts-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - phts-network
    restart: unless-stopped

  # ============================================================================
  # Loki — Log Aggregation
  # ============================================================================
  loki:
    image: grafana/loki:latest
    container_name: phts-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - phts-network
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Promtail — Log Collector (ships Docker logs → Loki)
  # ============================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: phts-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - phts-network
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================================
  # Adminer — Database UI at http://localhost:8080
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: phts-adminer
    depends_on:
      - postgres
    ports:
      - "8181:8080"
    networks:
      - phts-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped

  # ============================================================================
  # pgAdmin — optional, start with: docker compose --profile admin up
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: phts-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - phts-network
    depends_on:
      - postgres
    profiles:
      - admin
    restart: unless-stopped

  # ============================================================================
  # Kibana — optional, start with: docker compose --profile admin up
  # ============================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: phts-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - phts-network
    depends_on:
      - elasticsearch
    profiles:
      - admin
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  phts-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
