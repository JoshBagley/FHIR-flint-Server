user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/fhir+json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=expand_limit:10m rate=20r/s;

    upstream fhir_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # HTTP — redirect all traffic to HTTPS, except Let's Encrypt ACME challenges
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name YOUR_DOMAIN_HERE;

        # Let's Encrypt ACME challenge (certbot webroot renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS — main application server
    # Replace YOUR_DOMAIN_HERE with your actual domain before deploying.
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN_HERE;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; img-src 'self' data: fastapi.tiangolo.com; font-src 'self' fonts.gstatic.com; frame-ancestors 'none'; connect-src 'self';" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Metrics (restrict to internal network)
        location /metrics {
            proxy_pass http://fhir_backend/metrics;
            allow 172.0.0.0/8;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
        }

        # AI assist (longer timeout — Claude/Gemini can be slow)
        location ~ ^/ai/ {
            limit_req zone=expand_limit burst=5 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
        }

        # MCP Chat
        location ~ ^/mcp-chat/ {
            limit_req zone=expand_limit burst=5 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
        }

        # Admin endpoints
        location ~ ^/admin/ {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 30s;
        }

        # FHIR API + SDO search endpoints
        location ~ ^/(ValueSet|CodeSystem|ConceptMap|metadata|analytics|sdo|\$stats) {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # $expand gets a stricter rate limit
        location ~ /\$expand {
            limit_req zone=expand_limit burst=10 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
        }

        # API documentation
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ---------------------------------------------------------------------------
        # Mock PHIN VADS legacy URL redirect demo
        # Requires: 127.0.0.1   phinvads.test  in the visitor's hosts file,
        # OR use a real subdomain pointing to this server (e.g. legacy.your-domain.com).
        # ---------------------------------------------------------------------------
        location ~* ^/vads/ViewValueSet\.action$ {
            return 302 https://$host/?phts_oid=$arg_oid&phts_type=ValueSet;
        }

        location ~* ^/vads/ViewCodeSystem\.action$ {
            return 302 https://$host/?phts_oid=$arg_oid&phts_type=CodeSystem;
        }

        # Frontend — served by the production nginx container (port 80 internally)
        location / {
            proxy_pass http://frontend:80/;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ---------------------------------------------------------------------------
    # Mock PHIN VADS server block (phinvads.test local demo)
    # See "Legacy URL Redirect" section in CLAUDE.md.
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name phinvads.test;

        location ~* ^/vads/ViewValueSet\.action$ {
            return 302 http://localhost/?phts_oid=$arg_oid&phts_type=ValueSet;
        }

        location ~* ^/vads/ViewCodeSystem\.action$ {
            return 302 http://localhost/?phts_oid=$arg_oid&phts_type=CodeSystem;
        }

        location / {
            return 302 http://localhost/;
        }
    }

    # ---------------------------------------------------------------------------
    # YOUR_LEGACY_DOMAIN_HERE — cloud PHIN VADS redirect demo
    # HTTP: ACME challenges + redirect to HTTPS
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name YOUR_LEGACY_DOMAIN_HERE;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # YOUR_LEGACY_DOMAIN_HERE — HTTPS redirect gateway
    # Simulates a PHIN VADS legacy URL and redirects to PH-TS with the OID.
    # Example: https://YOUR_LEGACY_DOMAIN_HERE/vads/ViewValueSet.action?oid=2.16.840.1.114222.4.11.1038
    #       -> https://YOUR_DOMAIN_HERE/?phts_oid=2.16.840.1.114222.4.11.1038&phts_type=ValueSet
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name YOUR_LEGACY_DOMAIN_HERE;

        ssl_certificate     /etc/letsencrypt/live/YOUR_LEGACY_DOMAIN_HERE/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_LEGACY_DOMAIN_HERE/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location ~* ^/vads/ViewValueSet\.action$ {
            return 302 https://YOUR_DOMAIN_HERE/?phts_oid=$arg_oid&phts_type=ValueSet;
        }

        location ~* ^/vads/ViewCodeSystem\.action$ {
            return 302 https://YOUR_DOMAIN_HERE/?phts_oid=$arg_oid&phts_type=CodeSystem;
        }

        location / {
            return 302 https://YOUR_DOMAIN_HERE/;
        }
    }
}
