name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd ph-ts/backend
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: |
          cd ph-ts/backend
          pytest tests/ -v --cov=app

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd ph-ts/frontend
          npm ci
      - name: Run tests
        run: |
          cd ph-ts/frontend
          npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lint backend
        run: |
          cd ph-ts/backend
          pip install flake8
          flake8 app/
      - name: Lint frontend
        run: |
          cd ph-ts/frontend
          npm ci
          npm run lint

