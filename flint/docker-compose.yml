services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: flint-postgres
    environment:
      POSTGRES_DB: flint
      POSTGRES_USER: flint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flint_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flint-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flint"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Elasticsearch for Fast Search
  # ============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: flint-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - flint-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Redis for Caching
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: flint-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - flint-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # Backend FHIR Server (FastAPI)
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flint-backend
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://flint:${POSTGRES_PASSWORD:-flint_dev_password}@postgres:5432/flint
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ENABLE_AUTH: ${ENABLE_AUTH:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      BASE_URL: ${BASE_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      UMLS_API_KEY: ${UMLS_API_KEY:-}
      GIT_SHA: ${GIT_SHA:-unknown}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      LOINC_USERNAME: ${LOINC_USERNAME:-}
      LOINC_PASSWORD: ${LOINC_PASSWORD:-}
    networks:
      - flint-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================================
  # Frontend (React/Vite — production build served by nginx)
  # ============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    container_name: flint-frontend
    depends_on:
      - backend
    networks:
      - flint-network
    restart: unless-stopped

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: flint-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - flint-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Prometheus Metrics Collection          [profile: observability]
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: flint-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - flint-network
    profiles:
      - observability
    restart: unless-stopped

  # ============================================================================
  # Grafana Dashboards                     [profile: observability]
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: flint-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    networks:
      - flint-network
    profiles:
      - observability
    restart: unless-stopped

  # ============================================================================
  # Loki — Log Aggregation                 [profile: observability]
  # ============================================================================
  loki:
    image: grafana/loki:latest
    container_name: flint-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - flint-network
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - observability
    restart: unless-stopped

  # ============================================================================
  # Promtail — Log Collector               [profile: observability]
  # ============================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: flint-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - flint-network
    depends_on:
      loki:
        condition: service_healthy
    profiles:
      - observability
    restart: unless-stopped

  # ============================================================================
  # Adminer — Database UI                  [profile: tools]
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: flint-adminer
    depends_on:
      - postgres
    networks:
      - flint-network
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    profiles:
      - tools
    restart: unless-stopped

  # ============================================================================
  # pgAdmin — Heavy DB UI                  [profile: admin]
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flint-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    networks:
      - flint-network
    depends_on:
      - postgres
    profiles:
      - admin
    restart: unless-stopped

  # ============================================================================
  # Kibana — Elasticsearch UI              [profile: admin]
  # ============================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: flint-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - flint-network
    depends_on:
      - elasticsearch
    profiles:
      - admin
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  flint-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
