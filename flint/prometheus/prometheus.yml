global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'flint-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # elasticsearch: native Prometheus metrics require the Prometheus exporter plugin.
  # To enable, add 'elasticsearch-exporter' as a sidecar service in docker-compose.yml
  # and uncomment the block below.
  #
  # - job_name: 'elasticsearch'
  #   static_configs:
  #     - targets: ['elasticsearch-exporter:9114']

  # redis: Prometheus metrics require redis_exporter sidecar.
  # To enable, add 'redis_exporter' as a service in docker-compose.yml
  # and uncomment the block below.
  #
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
