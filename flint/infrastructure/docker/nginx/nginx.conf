user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/fhir+json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=expand_limit:10m rate=20r/s;
    limit_req_status 429;

    upstream fhir_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Liveness probe — nginx-level only (always 200 if nginx is up)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Readiness probe — proxied to backend (checks Postgres, ES, Redis; returns 503 if degraded)
        location /ready {
            access_log off;
            proxy_pass http://fhir_backend/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_read_timeout 10s;
        }

        # Metrics (restrict to internal network)
        location /metrics {
            proxy_pass http://fhir_backend/metrics;
            allow 172.0.0.0/8;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
        }

        # AI assist (longer timeout — Claude API calls can take a few seconds)
        location ~ ^/ai/ {
            limit_req zone=expand_limit burst=5 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
        }

        # MCP Chat — AI tool-calling chat backed by FHIR endpoints (longer timeout)
        location ~ ^/mcp-chat/ {
            limit_req zone=expand_limit burst=5 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
        }

        # Admin endpoints (sync trigger, sync status)
        location ~ ^/admin/ {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 30s;
        }

        # System-level history (GET /_history) — must be before the generic prefix location /
        location = /_history {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 60s;
        }

        # FHIR API + SDO search endpoints + stats
        location ~ ^/(ValueSet|CodeSystem|ConceptMap|Patient|Observation|Condition|Encounter|AllergyIntolerance|Immunization|Organization|Practitioner|PractitionerRole|Location|MedicationRequest|Procedure|DiagnosticReport|metadata|analytics|stats|sdo|\$stats|_history) {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # $expand gets a stricter rate limit (expensive operation)
        location ~ /\$expand {
            limit_req zone=expand_limit burst=10 nodelay;

            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_read_timeout 120s;
        }

        # API documentation (Swagger UI, ReDoc, OpenAPI schema)
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # FHIR Bundle: POST / → backend; GET / → frontend (exact-match takes priority over prefix)
        location = / {
            error_page 418 = @fhir_bundle;
            if ($request_method = POST) { return 418; }
            proxy_pass http://frontend:5173/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location @fhir_bundle {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://fhir_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Frontend (Vite dev server) — all non-FHIR paths
        location / {
            proxy_pass http://frontend:5173/;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS (uncomment and configure when ready for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    # }

}
